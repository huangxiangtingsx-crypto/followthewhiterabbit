<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Theater Notes Gallery</title>
    <style>
        :root {
            /* P2 黄玫瑰油画厚涂色系 */
            --rose-bright: #ffdf00;
            --rose-deep: #f39c12;
            --rose-text: #7e5109;
            /* P1 紫藤花层叠叠色系 */
            --wisteria-light: #e8d7f5;
            --wisteria-mid: #b388ff;
            --wisteria-dark: #512da8;
            
            --theater-black: #1a1a1a;
            --canvas-bg: #f4f1ea; 
        }

        body {
            font-family: "PingFang SC", "STHeiti", sans-serif;
            background-color: var(--canvas-bg);
            background-image: 
                linear-gradient(90deg, rgba(255,255,255,0.5) 1px, transparent 1px),
                linear-gradient(rgba(255,255,255,0.5) 1px, transparent 1px);
            background-size: 3px 3px;
            margin: 0;
            padding: 30px 20px;
            color: #2c2c2c;
        }

        .container {
            max-width: 1150px;
            margin: 0 auto;
            background: #ffffff;
            padding: 30px;
            border-radius: 4px;
            box-shadow: 0 15px 35px rgba(62, 53, 42, 0.15), 0 0 0 12px #ffffff, 0 0 0 14px #e5dec9;
            position: relative;
        }

        .rose-btn, .wisteria-btn {
            border: none;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            font-size: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
        }

        .rose-btn {
            background: linear-gradient(135deg, #fff7bd 0%, var(--rose-bright) 40%, #f1c40f 70%, var(--rose-deep) 100%);
            box-shadow: 0 4px 0 #d4ac0d, 0 5px 10px rgba(126, 81, 9, 0.35), inset 0 1px 0 rgba(255,255,255,0.6);
            border: 1px solid #f7dc6f;
        }
        .rose-btn:hover { transform: translateY(-2px) scale(1.05); box-shadow: 0 6px 0 #d4ac0d, 0 8px 15px rgba(126, 81, 9, 0.4); }
        .rose-btn:active { transform: translateY(2px) scale(0.98); box-shadow: 0 2px 0 #d4ac0d, 0 4px 6px rgba(126, 81, 9, 0.3); }

        .wisteria-btn {
            background: linear-gradient(135deg, #f3e5f5 0%, var(--wisteria-light) 30%, var(--wisteria-mid) 70%, var(--wisteria-dark) 100%);
            box-shadow: 0 4px 0 #4527a0, 0 5px 10px rgba(49, 27, 146, 0.35), inset 0 1px 0 rgba(255,255,255,0.4);
            border: 1px solid #d1c4e9;
        }
        .wisteria-btn:hover { transform: translateY(-2px) scale(1.05); box-shadow: 0 6px 0 #4527a0, 0 8px 15px rgba(49, 27, 146, 0.4); }
        .wisteria-btn:active { transform: translateY(2px) scale(0.98); box-shadow: 0 2px 0 #4527a0, 0 4px 6px rgba(49, 27, 146, 0.3); }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 3px double #e5dec9;
            padding-bottom: 15px;
        }
        .logo-area { display: flex; align-items: center; gap: 15px; }
        .logo-area h1 { margin: 0; font-size: 26px; color: var(--theater-black); font-family: "Cinzel", "STKaiti", serif; font-weight: 700; letter-spacing: 1px; }

        .month-switcher {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 25px;
            margin-bottom: 20px;
        }
        .month-btn {
            background: none;
            border: 1px solid #bda881;
            padding: 5px 12px;
            cursor: pointer;
            border-radius: 4px;
            font-weight: bold;
            color: #4a3c28;
            transition: all 0.2s;
        }
        .month-btn:hover { background: #4a3c28; color: #fffdf0; }
        .month-title { font-family: Georgia, serif; font-size: 20px; font-weight: bold; letter-spacing: 2px; color:#444; min-width: 160px; text-align: center; }

        .emoji-config-bar {
            background: #fdfbf7;
            border: 1px solid #e5dec9;
            border-radius: 6px;
            padding: 12px 20px;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
            font-size: 13px;
        }
        .emoji-tag-list { display: flex; gap: 8px; flex-wrap: wrap; }
        .emoji-pill { background: #fff; border: 1px solid #d5ccbb; padding: 4px 10px; border-radius: 20px; display: flex; align-items: center; gap: 6px; font-weight: bold;}
        .emoji-pill span { color: #888; cursor: pointer; }
        .emoji-pill span:hover { color: #c0392b; }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 14px;
            padding: 15px;
            background-image: linear-gradient(rgba(180, 160, 140, 0.25) 1px, transparent 1px);
            background-size: 100% 26px;
        }

        .calendar-header { font-weight: bold; text-align: center; padding: 14px 0; border-radius: 4px; font-size: 14px; border: 1px solid rgba(0,0,0,0.05); }
        .ch-1 { background: #fadbd8; color: #78281f; }
        .ch-2 { background: #fdebd0; color: #7e5109; }
        .ch-3 { background: #fcf3cf; color: #7d6608; } 
        .ch-4 { background: #d5f5e3; color: #145a32; }
        .ch-5 { background: #d6e4ff; color: #1a5276; } 
        .ch-6 { background: #e8dbfc; color: #4a235a; } 
        .ch-7 { background: #f9ebea; color: #641e16; } 

        .calendar-day {
            min-height: 130px;
            border: 1px solid #d5ccbb;
            border-radius: 4px;
            padding: 10px;
            position: relative;
            background: rgba(255, 255, 255, 0.9);
            box-shadow: inset 0 0 8px rgba(213,204,187,0.2);
            transition: all 0.3s;
        }
        .calendar-day:hover { border-color: var(--rose-deep); box-shadow: 0 6px 16px rgba(126,81,9,0.12); background: #fffdf9; }
        .calendar-day.empty-slot { background: rgba(0,0,0,0.02); border-color: transparent; box-shadow: none; pointer-events: none;}

        .col-highlight-wed { background-color: rgba(252, 243, 207, 0.4) !important; }
        .col-highlight-fri { background-color: rgba(214, 228, 255, 0.4) !important; }
        .col-highlight-sat { background-color: rgba(232, 219, 252, 0.45) !important; }
        .col-highlight-sun { background-color: rgba(249, 235, 234, 0.4) !important; }

        .day-number { font-weight: bold; font-size: 16px; color: #7f8c8d; margin-bottom: 8px; }

        .show-badge {
            background: linear-gradient(90deg, #f4f6f7 0%, #ffffff 100%);
            border-left: 4px solid #2980b9;
            padding: 6px;
            font-size: 12px;
            margin-bottom: 8px;
            border-radius: 2px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.06);
            cursor: pointer;
            transition: transform 0.2s;
        }
        .show-badge:hover { transform: scale(1.02); }
        .show-badge.watched { background: #f4f9f4; border-left-color: #27ae60; text-decoration: line-through; color: #95a5a6; }
        
        .show-badge.emoji-only-mode {
            background: transparent;
            border: none;
            box-shadow: none;
            font-size: 20px;
            text-align: center;
            margin: 4px 0;
            padding: 0;
            display: inline-block;
            width: 32px;
            height: 32px;
            line-height: 32px;
            position: relative;
        }
        .show-badge.emoji-only-mode .micro-time {
            position: absolute;
            bottom: -6px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 9px;
            color: #7f8c8d;
            background: rgba(255,255,255,0.8);
            padding: 0 2px;
            border-radius: 3px;
            line-height: 1;
            white-space: nowrap;
        }
        .show-badge.emoji-only-mode .recom-tag { display: none; }

        .recom-tag { background: #fef9e7; color: #e67e22; padding: 1px 4px; border-radius: 2px; font-weight: bold; float: right; font-size: 10px; border: 1px solid #fdebd0; }

        /* 牛皮纸便签 */
        .kraft-paper {
            background-color: #e4d5b7;
            background-image: linear-gradient(rgba(0,0,0,0.03) 1px, transparent 1px);
            background-size: 100% 20px;
            border-left: 15px solid #bda881;
            padding: 30px;
            border-radius: 2px;
            box-shadow: 5px 8px 25px rgba(50,40,30,0.25);
            max-width: 650px;
            margin: 25px auto;
            display: none;
            position: relative;
            border-top: 1px solid #f1e7d0;
        }
        .kraft-title { font-family: "STKaiti", "楷体", serif; font-size: 22px; font-weight: bold; color: #4a3c28; margin-bottom: 20px; text-align: center; border-bottom: 2px dashed #bda881; padding-bottom: 12px;}
        
        .kraft-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 15px;}
        .kraft-group { margin-bottom: 5px; }
        .kraft-group.full-width { grid-column: span 2; }
        .kraft-group label { display: block; margin-bottom: 5px; font-weight: bold; color: #4a3c28; font-size: 13px; }
        .kraft-group input, .kraft-group textarea { width: 100%; padding: 10px; border: 1px solid #bda881; background: #fdfbf7; border-radius: 4px; box-sizing: border-box; font-size: 14px; color: #332211; }
        .kraft-group textarea { font-family: monospace; resize: vertical; }
        .kraft-group input:focus, .kraft-group textarea:focus { border-color: var(--rose-deep); outline: none; background: #fff; }

        .ticket-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.75); justify-content: center; align-items: center; z-index: 200;
            backdrop-filter: blur(4px);
        }
        .ticket-stub { background: #faf6ee; width: 90%; max-width: 450px; border-radius: 4px; box-shadow: 0 25px 50px rgba(0,0,0,0.5); position: relative; padding: 30px; box-sizing: border-box; border: 3px solid #1a1a1a; }
        .ticket-stub::before, .ticket-stub::after { content: ''; position: absolute; top: 62%; width: 26px; height: 26px; background: #1a1a1a; border-radius: 50%; z-index: 10; }
        .ticket-stub::before { left: -14px; }
        .ticket-stub::after { right: -14px; }
        
        .ticket-divide { border-top: 3px dashed #bda881; margin: 25px 0; position: relative; }
        .ticket-head { font-family: "Cinzel", "STKaiti", serif; text-align: center; font-size: 24px; font-weight: bold; color: #1a1a1a; margin-bottom: 6px; letter-spacing: 1px; }
        .ticket-time { text-align: center; color: #cd6155; font-size: 14px; margin-bottom: 20px; font-weight: bold; }

        .stats-panel { display: none; padding: 25px; background: #fffcf7; border-radius: 8px; border: 2px solid var(--wisteria-mid); box-shadow: 0 10px 25px rgba(81,45,168,0.08); margin-top: 20px; }
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: 25px; }
        .stats-card { background: white; padding: 18px; border-radius: 4px; border: 1px solid #e8dbfc; box-shadow: 0 4px 15px rgba(0,0,0,0.02); position: relative;}
        .stats-card::before { content:''; position: absolute; top:0; left:0; width:100%; height:4px; background: var(--wisteria-mid); }
        .stats-card h4 { margin: 0 0 12px 0; color: var(--wisteria-dark); font-size: 15px; border-bottom: 1px dashed #e8dbfc; padding-bottom: 6px; }
        .stats-list { font-size: 13px; line-height: 2; padding-left: 18px; color: #444; }

        .close-x { position: absolute; top: 15px; right: 15px; cursor: pointer; font-size: 22px; color: #999; transition: color 0.2s; }
        .close-x:hover { color: #1a1a1a; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="logo-area">
            <button class="wisteria-btn" title="紫藤花数据看板" onclick="toggleStatsPage()">🪻</button>
            <h1>Theater Notes Gallery</h1>
        </div>
        <button class="rose-btn" title="黄玫瑰录入排期" onclick="showKraftPane()">🌹</button>
    </header>

    <!-- 演员Emoji配置区 -->
    <div class="emoji-config-bar">
        <strong style="color: #4a3c28;">🎭 演员印章对齐：</strong>
        <div class="emoji-tag-list" id="emojiTagList"></div>
        <div style="display: flex; gap: 6px; margin-left: auto;">
            <input type="text" id="cfgActorName" placeholder="演员名字" style="width: 80px; padding: 4px 8px; border:1px solid #d5ccbb; border-radius:4px; font-size:12px;">
            <input type="text" id="cfgActorEmoji" placeholder="Emoji" style="width: 50px; padding: 4px 8px; border:1px solid #d5ccbb; border-radius:4px; text-align:center; font-size:12px;">
            <button onclick="addEmojiMapping()" style="background:var(--theater-black); color:white; border:none; padding:4px 10px; border-radius:4px; font-size:12px; cursor:pointer;">绑定</button>
        </div>
    </div>

    <!-- 1. 日历主视图 -->
    <div id="calendarPage">
        <div class="month-switcher">
            <button class="month-btn" onclick="changeMonth(-1)">◀</button>
            <div class="month-title" id="monthDisplayTitle">2026 . JUNE</div>
            <button class="month-btn" onclick="changeMonth(1)">▶</button>
        </div>

        <div class="calendar-grid" id="calendar">
            <div class="calendar-header ch-1">一</div><div class="calendar-header ch-2">二</div>
            <div class="calendar-header ch-3">三</div><div class="calendar-header ch-4">四</div>
            <div class="calendar-header ch-5">五</div><div class="calendar-header ch-6">六</div>
            <div class="calendar-header ch-7">日</div>
        </div>
    </div>

    <!-- 2. 📊 紫藤花数据统计专页 -->
    <div id="statsPage" class="stats-panel">
        <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 2px dashed #e8dbfc; padding-bottom: 10px;">
            <h3 style="margin:0; color:var(--wisteria-dark); font-family:'STKaiti', serif;">🪻 紫藤物语 · 戏剧戏剧生涯存根</h3>
            <button class="wisteria-btn" title="返回主页" onclick="hideStatsPage()">🪻</button>
        </div>
        <div class="stats-grid">
            <div class="stats-card">
                <h4>🎭 演员连打频率排行</h4>
                <ol class="stats-list" id="statActorsCount"><li>暂无数据</li></ol>
            </div>
            <div class="stats-card">
                <h4>👑 主卡卡司评分排行</h4>
                <ol class="stats-list" id="statActorsRate"><li>暂无数据</li></ol>
            </div>
            <div class="stats-card">
                <h4>🎬 累计观看剧目清单</h4>
                <ul class="stats-list" id="statShowsList"><li>暂无数据</li></ul>
            </div>
        </div>
    </div>

    <!-- 3. 📑 牛皮纸面板（多轨并行版） -->
    <div class="kraft-paper" id="kraftPane">
        <button class="rose-btn" style="position: absolute; top:12px; left:15px; width:34px; height:34px; font-size:16px; box-shadow:none;" title="返回日历" onclick="hideKraftPane()">🌹</button>
        <span class="close-x" onclick="hideKraftPane()">&times;</span>
        
        <div class="kraft-title" style="margin-top: 15px;">📜 手动与智能排期录入中心</div>
        
        <!-- ✨ 重新回归：方案 A：上传排期图片识别 -->
        <div style="background: #dcd0b3; padding: 15px; border-radius: 4px; margin-bottom: 15px; border: 1px dashed #bda881;">
            <label style="color: #4a3c28; font-weight: bold; display: block; margin-bottom: 8px; font-size:14px;">📸 方案 A：官方排期长图智能识别</label>
            <div style="display: flex; gap: 10px; align-items: center;">
                <input type="file" id="kraftImageFile" accept="image/*" style="font-size: 12px; color: #4a3c28;">
                <button style="background: #27ae60; color: white; border: none; padding: 6px 12px; border-radius: 4px; font-size: 12px; font-weight: bold; cursor: pointer; white-space: nowrap;" onclick="processImageInput()">✨ 智能识图解析</button>
            </div>
        </div>

        <!-- 方案 B：文本批量多场导入 -->
        <div style="background: #dcd0b3; padding: 15px; border-radius: 4px; margin-bottom: 15px; border: 1px dashed #bda881;">
            <label style="color: #4a3c28; font-weight: bold; display: block; margin-bottom: 6px; font-size:14px;">🗂️ 方案 B：文本批量多场导入</label>
            <textarea id="batchInputArea" rows="3" style="width:100%; padding:8px; border:1px solid #bda881; background:#fdfbf7; border-radius:4px; font-size:12px; box-sizing:border-box;" placeholder="格式：日期 时间 剧名 主演 (每场占一行)&#13;例如：&#13;2026-06-12 19:30 阿波罗尼亚 阿云嘎&#13;2026-07-03 14:00 大状王 郑云龙"></textarea>
            <button style="margin-top:6px; background:#4a3c28; color:#fffdf0; border:none; padding:6px 12px; border-radius:4px; font-size:12px; font-weight:bold; cursor:pointer;" onclick="processBatchInput()">⚡ 智能批量解析入库</button>
        </div>

        <!-- 方案 C：单场次细致录入 -->
        <div style="background: rgba(255,255,255,0.3); padding: 15px; border-radius: 4px; border: 1px solid #bda881;">
            <label style="color: #4a3c28; font-weight: bold; display: block; margin-bottom: 10px; font-size:14px;">✍️ 方案 C：单场次精准录入</label>
            <div class="kraft-grid">
                <div class="kraft-group">
                    <label>目标演员 (Actor)：</label>
                    <input type="text" id="kfActor" placeholder="例如：阿云嘎">
                </div>
                <div class="kraft-group">
                    <label>演出日期 (Date)：</label>
                    <input type="text" id="kfDate" placeholder="例如：2026-06-03">
                </div>
                <div class="kraft-group">
                    <label>场次时间 (Time)：</label>
                    <input type="text" id="kfTime" placeholder="例如：19:30">
                </div>
                <div class="kraft-group">
                    <label>剧目名称 (Show)：</label>
                    <input type="text" id="kfShow" placeholder="例如：阿波罗尼亚">
                </div>
                <div class="kraft-group full-width">
                    <label>同场其他卡司 (Full Cast)：</label>
                    <input type="text" id="kfFull" placeholder="用斜杠隔开：演员B / 演员C">
                </div>
            </div>
            <button style="width:100%; background:#3a2f1d; color:#fffdf0; border:none; padding:10px; border-radius:4px; font-weight:bold; cursor:pointer; font-size:14px; box-shadow: 0 4px 8px rgba(0,0,0,0.15);" onclick="saveSingleKraftData()">💾 牢固钉在日历画框中</button>
        </div>
    </div>
</div>

<!-- 4. 🎟️ 电影票根详情窗 -->
<div class="ticket-modal" id="ticketModal">
    <div class="ticket-stub">
        <span class="close-x" onclick="closeTicket()">&times;</span>
        
        <div class="ticket-head" id="tkShowName">SHOW ENTRY</div>
        <div class="ticket-time" id="tkDateTime">2026.06.01 | 19:30</div>
        
        <div style="background: #f2ebd9; padding: 14px; border-radius: 2px; font-size: 13px; color:#444; line-height:1.6; border-left: 4px solid #1a1a1a;">
            <strong>📋 全卡司阵容 (FULL CAST)：</strong>
            <div id="tkFullCast" style="margin-top: 6px; color:#000; font-weight:500;">-</div>
        </div>

        <div class="ticket-divide"></div>

        <div style="font-size: 11px; font-weight: bold; color:#888; letter-spacing:1px; margin-bottom:12px; display:flex; justify-content:space-between;">
            <span>THEATER HANDBOOK STUB</span>
            <span id="tkRecScore" style="color:var(--rose-deep); font-weight:bold;"></span>
        </div>

        <div style="margin-bottom: 15px;">
            <label style="font-weight: bold; font-size: 14px; color:#2980b9; cursor:pointer;">
                <input type="checkbox" id="tkWatched" onchange="toggleTkWatched()"> 🎟️ 开启此场剧目解锁留存印章
            </label>
        </div>

        <div id="tkRatingArea" style="display: none; background: #fff; padding: 12px; border: 1px dashed #bda881; border-radius: 4px;">
            <div style="display: flex; gap: 12px; margin-bottom: 12px;">
                <div style="flex:1;">
                    <label style="display:block; font-size:12px; margin-bottom:4px; font-weight:bold;">戏剧本体分</label>
                    <input type="number" id="tkShowRate" min="1" max="5" style="width:100%; padding:6px; border:1px solid #ccc; border-radius:4px;">
                </div>
                <div style="flex:1;">
                    <label style="display:block; font-size:12px; margin-bottom:4px; font-weight:bold;">卡司惊艳度</label>
                    <input type="number" id="tkActorRate" min="1" max="5" style="width:100%; padding:6px; border:1px solid #ccc; border-radius:4px;">
                </div>
            </div>
            <div>
                <label style="display:block; font-size:12px; margin-bottom:4px; font-weight:bold;">剧评小作文 / REPO：</label>
                <textarea id="tkRepo" rows="3" style="width:100%; padding:6px; border:1px solid #ccc; border-radius:4px; font-size:12px; box-sizing:border-box;" placeholder="记录随谢幕消散的感动..."></textarea>
            </div>
        </div>

        <div style="display: flex; gap: 12px; margin-top: 20px;">
            <button onclick="deleteTicketEvent()" style="background:#fff; color:#c0392b; border:1px solid #fadbd8; padding:8px 14px; border-radius:4px; font-weight:bold; cursor:pointer; font-size:13px;">撕毁弃场</button>
            <button onclick="saveTicketHandshuck()" style="flex:1; background:var(--theater-black); color:#fff; border:none; padding:8px; border-radius:4px; font-weight:bold; cursor:pointer; font-size:14px; letter-spacing:1px;">盖印存根</button>
        </div>
    </div>
</div>

<script>
    let globalDatabase = { showScores: {}, actorScores: {} };
    
    // 🎭 演员与其自定义 Emoji 的映射池
    let actorEmojiMap = {
        "阿云嘎": "🐑",
        "郑云龙": "🐉"
    };

    let currentYear = 2026;
    let currentMonth = 5; 
    const monthNames = ["JANUARY", "FEBRUARY", "MARCH", "APRIL", "MAY", "JUNE", "JULY", "AUGUST", "SEPTEMBER", "OCTOBER", "NOVEMBER", "DECEMBER"];

    let scheduleData = [
        { id: 1, date: "2026-06-03", time: "19:30", show: "阿波罗尼亚", mainActor: "阿云嘎", fullCast: "阿云嘎 / 演员B / 演员C", watched: true, showRate: 5, actorRate: 5, repo: "绝美咏叹调！主卡的高音配合整个舞台的灯光，完全被震撼到了。" },
        { id: 2, date: "2026-06-05", time: "19:30", show: "大状王", mainActor: "郑云龙", fullCast: "郑云龙 / 核心群戏组", watched: false, showRate: null, actorRate: null, repo: "" }
    ];
    let currentEventId = null;

    function calcRecommendation(show, actor) {
        let showArr = globalDatabase.showScores[show] || [4.7];
        let actorArr = globalDatabase.actorScores[actor] || [4.7];
        let showAvg = showArr.reduce((a, b) => a + b, 0) / showArr.length;
        let actorAvg = actorArr.reduce((a, b) => a + b, 0) / actorArr.length;
        return ((showAvg * 0.5) + (actorAvg * 0.5)).toFixed(1);
    }

    scheduleData.forEach(e => {
        if(e.watched && e.showRate) {
            if(!globalDatabase.showScores[e.show]) globalDatabase.showScores[e.show] = [];
            if(!globalDatabase.actorScores[e.mainActor]) globalDatabase.actorScores[e.mainActor] = [];
            globalDatabase.showScores[e.show].push(e.showRate);
            globalDatabase.actorScores[e.mainActor].push(e.actorRate);
        }
    });

    function renderEmojiBar() {
        const listDiv = document.getElementById('emojiTagList');
        listDiv.innerHTML = "";
        Object.entries(actorEmojiMap).forEach(([name, emo]) => {
            const pill = document.createElement('div');
            pill.className = 'emoji-pill';
            pill.innerHTML = `${name} ${emo} <span onclick="deleteEmojiMapping('${name}')">&times;</span>`;
            listDiv.appendChild(pill);
        });
    }

    function addEmojiMapping() {
        const name = document.getElementById('cfgActorName').value.trim();
        const emoji = document.getElementById('cfgActorEmoji').value.trim();
        if(!name || !emoji) return;
        actorEmojiMap[name] = emoji;
        document.getElementById('cfgActorName').value = "";
        document.getElementById('cfgActorEmoji').value = "";
        renderEmojiBar();
        renderCalendar();
    }

    function deleteEmojiMapping(name) {
        delete actorEmojiMap[name];
        renderEmojiBar();
        renderCalendar();
    }

    // ✨ 方案 A：回归的图片识别逻辑接口
    function processImageInput() {
        const fileInput = document.getElementById('kraftImageFile');
        if(fileInput.files.length === 0) { alert("请先选择一张要上传的排期图片哦！"); return; }
        
        // 此处留作对接你本地原有的 OCR 识别逻辑或大模型图片解析 API
        // 模拟解析出的数据：
        alert("✨ 正在通过画廊画布解析图片排期...");
        
        // 模拟成功塞入一条图片解析数据
        const demoId = Date.now();
        scheduleData.push({
            id: demoId,
            date: `${currentYear}-${(currentMonth + 1).toString().padStart(2, '0')}-18`,
            time: "19:30",
            show: "图片识别测试剧目",
            mainActor: "阿云嘎",
            fullCast: "阿云嘎 / 识图群卡",
            watched: false, showRate: null, actorRate: null, repo: ""
        });

        alert("🎉 图片识别完成！已自动将剧目钉在当月 18 号日历。");
        fileInput.value = "";
        hideKraftPane();
        renderCalendar();
    }

    // 方案 B：文本批量多场导入
    function processBatchInput() {
        const text = document.getElementById('batchInputArea').value.trim();
        if(!text) { alert("没有检测到粘贴内容哦！"); return; }

        const lines = text.split('\n');
        let parsedCount = 0;

        lines.forEach(line => {
            const cleanLine = line.trim();
            if(!cleanLine) return;

            const tokens = cleanLine.split(/\s+/);
            if(tokens.length >= 3) {
                const date = tokens[0];
                const time = tokens[1];
                const show = tokens[2];
                const actor = tokens[3] || "群卡";

                scheduleData.push({
                    id: Date.now() + Math.random(),
                    date: date,
                    time: time,
                    show: show,
                    mainActor: actor,
                    fullCast: actor,
                    watched: false, showRate: null, actorRate: null, repo: ""
                });
                parsedCount++;
            }
        });

        alert(`🎉 解析成功！已为您批量钉好 ${parsedCount} 场排期。`);
        document.getElementById('batchInputArea').value = "";
        hideKraftPane();
        renderCalendar();
    }

    // 动态月份渲染生成器
    function renderCalendar() {
        const calendarDiv = document.getElementById('calendar');
        while(calendarDiv.children.length > 7) { calendarDiv.removeChild(calendarDiv.lastChild); }

        document.getElementById('monthDisplayTitle').innerText = `${currentYear} . ${monthNames[currentMonth]}`;

        const firstDayOfThisMonth = new Date(currentYear, currentMonth, 1);
        const lastDayOfThisMonth = new Date(currentYear, currentMonth + 1, 0);
        
        const totalDays = lastDayOfThisMonth.getDate();
        let startDayOfWeek = firstDayOfThisMonth.getDay();
        if(startDayOfWeek === 0) startDayOfWeek = 7; 

        for(let s = 1; s < startDayOfWeek; s++) {
            const emptyCell = document.createElement('div');
            emptyCell.className = 'calendar-day empty-slot';
            calendarDiv.appendChild(emptyCell);
        }

        for (let i = 1; i <= totalDays; i++) {
            const dayStr = `${currentYear}-${(currentMonth + 1).toString().padStart(2, '0')}-${i.toString().padStart(2, '0')}`;
            const dayCell = document.createElement('div');
            dayCell.className = 'calendar-day';
            
            let dateObj = new Date(currentYear, currentMonth, i); 
            let dayOfWeek = dateObj.getDay(); 
            if(dayOfWeek === 3) dayCell.classList.add('col-highlight-wed');
            if(dayOfWeek === 5) dayCell.classList.add('col-highlight-fri');
            if(dayOfWeek === 6) dayCell.classList.add('col-highlight-sat');
            if(dayOfWeek === 0) dayCell.classList.add('col-highlight-sun');

            dayCell.innerHTML = `<div class="day-number">${i}</div>`;
            
            dayCell.onclick = () => {
                showKraftPane();
                document.getElementById('kfDate').value = dayStr;
            };

            const dayEvents = scheduleData.filter(e => e.date === dayStr);
            dayEvents.forEach(ev => {
                const badge = document.createElement('div');
                const customEmoji = actorEmojiMap[ev.mainActor];
                
                if(customEmoji) {
                    badge.className = `show-badge emoji-only-mode ${ev.watched ? 'watched' : ''}`;
                    badge.innerHTML = `${customEmoji}<span class="micro-time">${ev.time}</span>`;
                    badge.title = `【${ev.mainActor}】${ev.show} (${ev.time})`; 
                } else {
                    badge.className = `show-badge ${ev.watched ? 'watched' : ''}`;
                    let recScore = calcRecommendation(ev.show, ev.mainActor);
                    badge.innerHTML = `<span class="recom-tag">★${recScore}</span><b>${ev.mainActor}</b><br>${ev.show}<br>${ev.time}`;
                }
                
                badge.onclick = (e) => { e.stopPropagation(); openTicket(ev.id); };
                dayCell.appendChild(badge);
            });
            calendarDiv.appendChild(dayCell);
        }
    }

    function changeMonth(direction) {
        currentMonth += direction;
        if(currentMonth > 11) {
            currentMonth = 0;
            currentYear += 1;
        } else if(currentMonth < 0) {
            currentMonth = 11;
            currentYear -= 1;
        }
        renderCalendar();
    }

    function showKraftPane() { document.getElementById('kraftPane').style.display = 'block'; }
    function hideKraftPane() { document.getElementById('kraftPane').style.display = 'none'; }
    
    function saveSingleKraftData() {
        let actor = document.getElementById('kfActor').value.trim();
        let date = document.getElementById('kfDate').value.trim();
        let time = document.getElementById('kfTime').value.trim();
        let full = document.getElementById('kfFull').value.trim();
        let show = document.getElementById('kfShow').value.trim();

        if(!show || !date) { alert("剧目名称和日期不能为空！"); return; }

        scheduleData.push({
            id: Date.now() + Math.random(),
            date: date, time: time || "19:30", show: show, mainActor: actor || "未定", fullCast: full || actor,
            watched: false, showRate: null, actorRate: null, repo: ""
        });
        
        document.getElementById('kfActor').value = "";
        document.getElementById('kfTime').value = "";
        document.getElementById('kfFull').value = "";
        document.getElementById('kfShow').value = "";

        hideKraftPane();
        renderCalendar();
    }

    function openTicket(id) {
        currentEventId = id;
        const ev = scheduleData.find(e => e.id === id);
        document.getElementById('tkShowName').innerText = ev.show;
        document.getElementById('tkDateTime').innerText = `${ev.date} | ${ev.time}`;
        document.getElementById('tkFullCast').innerText = ev.fullCast;
        document.getElementById('tkWatched').checked = ev.watched;
        document.getElementById('tkShowRate').value = ev.showRate || "";
        document.getElementById('tkActorRate').value = ev.actorRate || "";
        document.getElementById('tkRepo').value = ev.repo || "";
        document.getElementById('tkRecScore').innerText = `SCORE: ★${calcRecommendation(ev.show, ev.mainActor)}`;
        
        toggleTkWatched();
        document.getElementById('ticketModal').style.display = 'flex';
    }
    function closeTicket() { document.getElementById('ticketModal').style.display = 'none'; }
    function toggleTkWatched() {
        document.getElementById('tkRatingArea').style.display = document.getElementById('tkWatched').checked ? 'block' : 'none';
    }

    function saveTicketHandshuck() {
        const ev = scheduleData.find(e => e.id === currentEventId);
        ev.watched = document.getElementById('tkWatched').checked;
        if(ev.watched) {
            ev.showRate = parseFloat(document.getElementById('tkShowRate').value) || 5;
            ev.actorRate = parseFloat(document.getElementById('tkActorRate').value) || 5;
            ev.repo = document.getElementById('tkRepo').value;

            if(!globalDatabase.showScores[ev.show]) globalDatabase.showScores[ev.show] = [];
            if(!globalDatabase.actorScores[ev.mainActor]) globalDatabase.actorScores[ev.mainActor] = [];
            globalDatabase.showScores[ev.show].push(ev.showRate);
            globalDatabase.actorScores[ev.mainActor].push(ev.actorRate);
        }
        closeTicket();
        renderCalendar();
    }
    function deleteTicketEvent() {
        if(confirm("确认要撕毁并移除这张戏剧票根吗？")) {
            scheduleData = scheduleData.filter(e => e.id !== currentEventId);
            closeTicket();
            renderCalendar();
        }
    }

    function toggleStatsPage() {
        const pane = document.getElementById('statsPage');
        if(pane.style.display === 'block') { hideStatsPage(); return; }
        let actCount = {};
        let actRates = {};
        let showSet = new Set();

        scheduleData.filter(e => e.watched).forEach(ev => {
            actCount[ev.mainActor] = (actCount[ev.mainActor] || 0) + 1;
            showSet.add(ev.show);
        });
        for(let act in globalDatabase.actorScores) {
            let arr = globalDatabase.actorScores[act];
            actRates[act] = (arr.reduce((a,b)=>a+b,0)/arr.length).toFixed(1);
        }
        let countHTML = Object.entries(actCount).sort((a,b)=>b[1]-a[1]).map(x => `<li><b>${x[0]}</b>：入场 ${x[1]} 场</li>`).join('') || "<li>暂无已看记录</li>";
        let rateHTML = Object.entries(actRates).sort((a,b)=>b[1]-a[1]).map(x => `<li><b>${x[0]}</b>：卡司均分 ★${x[1]}</li>`).join('') || "<li>暂无评分记录</li>";
        let showHTML = Array.from(showSet).map(x => `<li>🎭 《${x}》</li>`).join('') || "<li>暂无已看剧目</li>";

        document.getElementById('statActorsCount').innerHTML = countHTML;
        document.getElementById('statActorsRate').innerHTML = rateHTML;
        document.getElementById('statShowsList').innerHTML = showHTML;

        document.getElementById('calendarPage').style.display = 'none';
        pane.style.display = 'block';
    }
    function hideStatsPage() {
        document.getElementById('statsPage').style.display = 'none';
        document.getElementById('calendarPage').style.display = 'block';
    }

    window.onload = function() {
        renderEmojiBar();
        renderCalendar();
    };
</script>
</body>
</html>
